site_name: OpenSearch Docs
site_description: Concise documentation for @kagan-sh/opensearch
site_url: https://kagan-sh.github.io/opensearch/
docs_dir: docs
site_dir: site

repo_url: https://github.com/kagan-sh/opensearch
repo_name: kagan-sh/opensearch
edit_uri: edit/main/docs/

theme:
  name: material
  font: false
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Reference:
      - Configuration: reference/configuration.md
      - Result contract: reference/result-contract.md
      - Sources and extension status: reference/sources.md
  - Contributing: contributing.md
  - Feature requests: feature-requests.md
